name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: study-guide-app/package-lock.json

      - name: Install
        working-directory: study-guide-app
        run: npm ci

      - name: Verify canvas sync
        working-directory: study-guide-app
        run: |
          node scripts/sync-canvas.mjs
          git diff --exit-code src/StudyGuide.tsx || (
            echo "::error::canvases/study-guide.canvas.tsx and study-guide-app/src/StudyGuide.tsx are out of sync."
            echo "Run 'cd study-guide-app && node scripts/sync-canvas.mjs' (or '--reverse') and commit the result."
            exit 1
          )

      - name: Typecheck
        working-directory: study-guide-app
        run: npm run typecheck

      - name: Test
        working-directory: study-guide-app
        run: npm test

      - name: Build
        working-directory: study-guide-app
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: study-guide-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
